<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adactus — AI Compliance Scan</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--bg2:#0d1118;--teal:#5DCAA5;--teal-dim:rgba(93,202,165,0.1);--teal-border:rgba(93,202,165,0.2);--amber:#EF9F27;--amber-dim:rgba(239,159,39,0.1);--red:#F09595;--red-dim:rgba(240,149,149,0.1);--white:#e8f4ff;--white-60:rgba(232,244,255,0.6);--white-40:rgba(232,244,255,0.4);--white-20:rgba(232,244,255,0.2);--white-10:rgba(232,244,255,0.1);--white-05:rgba(232,244,255,0.05);--border:rgba(93,202,165,0.12);--border2:rgba(232,244,255,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:stretch;padding:0}
#app{width:100%;max-width:660px;margin:0 auto;padding:1.5rem}

/* NAV */
.scan-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 1.5rem;border-bottom:1px solid var(--border);background:rgba(8,12,16,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;margin:-1.5rem -1.5rem 1.5rem;width:calc(100% + 3rem)}
.scan-nav-status{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--white-40);letter-spacing:0.04em}
.nav-pulse{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* BADGE & HEADER */
.scan-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal-dim);border:1px solid var(--teal-border);color:var(--teal);font-size:10px;font-weight:500;padding:4px 10px;border-radius:4px;margin-bottom:10px;letter-spacing:0.06em;text-transform:uppercase}
.scan-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:-0.01em;margin-bottom:6px;line-height:1.1}
.scan-sub{font-size:14px;color:var(--white-40);line-height:1.6;margin-bottom:1.5rem;font-weight:300}

/* PROGRESS */
.progress-wrap{margin-bottom:1.25rem}
.progress-bar-bg{background:var(--white-05);border-radius:99px;height:2px;margin-bottom:6px}
.progress-bar{height:2px;border-radius:99px;background:var(--teal);transition:width 0.4s ease}
.progress-label{font-size:11px;color:var(--white-40)}

/* BLOCK LABEL */
.block-label{font-size:9px;color:var(--teal);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;font-weight:500}
.block-badge{background:var(--teal-dim);border-radius:99px;padding:2px 8px;border:1px solid var(--teal-border)}

/* QUESTION CARD */
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.question-text{font-size:14px;font-weight:500;color:var(--white);margin-bottom:0.875rem;line-height:1.5}
.multi-note{font-size:11px;color:var(--white-40);margin-bottom:8px}
.option-grid{display:flex;flex-direction:column;gap:6px}
.option-btn{background:var(--white-05);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--white-60);cursor:pointer;text-align:left;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.option-btn:hover{border-color:rgba(93,202,165,0.3);color:var(--teal)}
.option-btn.selected{border-color:var(--teal);background:var(--teal-dim);color:var(--teal)}

/* NAV BUTTONS */
.nav-row{display:flex;gap:10px;margin-top:1.25rem;align-items:center}
.btn-primary{background:var(--teal);color:var(--bg);border:none;border-radius:4px;padding:10px 20px;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s}
.btn-primary:hover{opacity:0.85}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid var(--border2);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--white-40);cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-secondary:hover{border-color:var(--teal-border);color:var(--teal)}

/* EMAIL CARD */
.email-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.5rem}
.email-card h3{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px}
.email-card p{font-size:13px;color:var(--white-40);margin-bottom:1rem;line-height:1.6;font-weight:300}
.score-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.score-chip{background:var(--white-05);border:1px solid var(--border2);border-radius:6px;padding:10px;text-align:center}
.chip-label{font-size:9px;color:var(--white-40);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.chip-val{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700}
.chip-green{border-color:rgba(93,202,165,0.2);background:rgba(93,202,165,0.05)}.chip-green .chip-val{color:var(--teal)}
.chip-amber{border-color:rgba(239,159,39,0.2);background:var(--amber-dim)}.chip-amber .chip-val{color:var(--amber)}
.chip-red{border-color:rgba(240,149,149,0.2);background:var(--red-dim)}.chip-red .chip-val{color:var(--red)}
.email-input-row{display:flex;gap:8px}
.email-input-row input{flex:1;padding:10px 12px;border:1px solid var(--border2);border-radius:4px;font-size:13px;background:var(--white-05);color:var(--white);font-family:'DM Sans',sans-serif}
.email-input-row input:focus{outline:none;border-color:var(--teal)}
.email-input-row input::placeholder{color:var(--white-40)}
.privacy-note{font-size:11px;color:var(--white-40);margin-top:8px}
.error-msg{background:var(--red-dim);border:1px solid rgba(240,149,149,0.2);border-radius:4px;padding:8px 12px;font-size:12px;color:var(--red);margin-top:8px}

/* LOADING */
.loading-wrap{padding:3rem 0;text-align:center}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:13px;color:var(--white-40);font-weight:300}

/* REPORT */
.report-header{margin-bottom:1.25rem}
.report-header h2{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.report-header p{font-size:12px;color:var(--white-40)}
.report-section{margin-bottom:1.25rem}
.report-section-header{display:flex;align-items:center;gap:10px;margin-bottom:0.75rem}
.rs-title{font-size:14px;font-weight:500;color:var(--white)}
.risk-badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;letter-spacing:0.04em}
.risk-laag{background:rgba(93,202,165,0.1);color:var(--teal)}
.risk-middel{background:var(--amber-dim);color:var(--amber)}
.risk-hoog{background:var(--red-dim);color:var(--red)}
.report-card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:1.25rem;border-left:2px solid}
.report-card-g{border-left-color:var(--teal)}
.report-card-a{border-left-color:var(--amber)}
.report-card-r{border-left-color:var(--red)}
.report-card p{font-size:13px;color:var(--white-40);line-height:1.7;margin-bottom:0.75rem;font-weight:300}
.report-card ul{padding-left:1.1rem}
.report-card ul li{font-size:13px;color:var(--white-40);line-height:1.7;margin-bottom:4px}
.report-card ul li::marker{color:var(--teal)}

/* CTA */
.cta-card{background:var(--teal-dim);border:1px solid var(--teal-border);border-radius:8px;padding:1.25rem;margin-top:1.5rem}
.cta-card h3{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.cta-card p{font-size:12px;color:rgba(93,202,165,0.6);margin-bottom:0.75rem}
.cta-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cta-tier{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:10px}
.tier-name{font-size:10px;font-weight:500;color:var(--white-40);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px}
.tier-price{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--teal)}
.tier-desc{font-size:10px;color:var(--white-40);margin-top:3px;line-height:1.4}

/* DISCLAIMER */
.disclaimer{font-size:10px;color:var(--white-40);margin-top:1.5rem;border-top:1px solid var(--border2);padding-top:1rem;line-height:1.6;font-weight:300}
</style>
</head>
<body>
<div id="app">
  <nav class="scan-nav">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="24" height="24" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <polygon points="24,2 42,12 42,36 24,46 6,36 6,12" fill="rgba(8,12,16,0.9)" stroke="rgba(93,202,165,0.45)" stroke-width="1.5"/>
        <polygon points="24,7 37,14 37,34 24,41 11,34 11,14" fill="none" stroke="rgba(93,202,165,0.12)" stroke-width="0.5"/>
        <line x1="24" y1="11" x2="24" y2="37" stroke="#5DCAA5" stroke-width="2"/>
        <line x1="13" y1="18" x2="35" y2="18" stroke="#5DCAA5" stroke-width="2"/>
        <line x1="13" y1="18" x2="11" y2="26" stroke="rgba(93,202,165,0.4)" stroke-width="1.2"/>
        <line x1="13" y1="18" x2="19" y2="26" stroke="rgba(93,202,165,0.4)" stroke-width="1.2"/>
        <path d="M9,26 Q15,31 21,26" fill="none" stroke="#5DCAA5" stroke-width="2"/>
        <line x1="35" y1="18" x2="29" y2="26" stroke="rgba(93,202,165,0.4)" stroke-width="1.2"/>
        <line x1="35" y1="18" x2="37" y2="26" stroke="rgba(93,202,165,0.4)" stroke-width="1.2"/>
        <path d="M27,26 Q33,31 39,26" fill="none" stroke="#5DCAA5" stroke-width="2"/>
        <line x1="19" y1="37" x2="29" y2="37" stroke="#5DCAA5" stroke-width="2"/>
        <circle cx="24" cy="11" r="1.5" fill="#5DCAA5"/>
      </svg>
      <div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#e8f4ff;letter-spacing:0.1em;text-transform:uppercase;line-height:1">AD<span style="color:#5DCAA5">ACTUS</span></div>
        <div style="font-size:7px;color:rgba(93,202,165,0.35);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px">Europese AI compliance. Vastgelegd.</div>
      </div>
    </div>
    <div class="scan-nav-status">
      <div class="nav-pulse"></div>
      Wetgeving bijgewerkt · 2026
    </div>
  </nav>
  <div id="screen"></div>
</div>
<script>
const QUESTIONS=[
  {id:'sector',block:1,blockName:'Jouw bedrijf',text:'In welke sector is jouw bedrijf actief?',type:'single',options:['Retail','Horeca','Bouw','Zorg','HR & Recruitment','Financiën & Verzekeringen','Transport & Logistiek','IT & Technologie','Juridisch & Advies','Overheid','Onderwijs','Andere']},
  {id:'size',block:1,text:'Hoeveel medewerkers heeft jouw bedrijf?',type:'single',options:['1 (solo)','2–9','10–49','50–249','250+']},
  {id:'tools',block:1,text:'Welke AI tools gebruikt jouw bedrijf? Selecteer alles wat van toepassing is.',type:'multi',options:['ChatGPT','Microsoft Copilot','Google Gemini','AI voor recruitment of HR','AI chatbot op website','AI voor boekhouding of financiën','AI voor marketing of content','Andere AI tools','Geen AI tools']},
  {id:'usage',block:1,text:'Waarvoor gebruik je deze AI tools voornamelijk?',type:'multi',options:['Teksten schrijven','Klantenservice','Beslissingen over medewerkers','Beslissingen over klanten','Data-analyse','Automatisering van processen','Andere']},
  {id:'personal_data',block:2,blockName:'Jouw data',text:'Verwerken jouw AI tools persoonsgegevens?',type:'single',options:['Ja','Nee','Weet ik niet']},
  {id:'data_from',block:2,text:'Van wie verwerkt jouw bedrijf persoonsgegevens via AI?',type:'multi',options:['Klanten','Medewerkers','Sollicitanten','Leveranciers','Anderen','Niemand']},
  {id:'privacy',block:2,text:'Heeft jouw bedrijf een privacybeleid en een register van verwerkingsactiviteiten?',type:'single',options:['Ja, beide','Alleen privacybeleid','Geen van beide','Weet ik niet']},
  {id:'data_share',block:2,text:'Deelt jouw bedrijf data met externe AI platformen zoals OpenAI, Google of Microsoft?',type:'single',options:['Ja','Nee','Weet ik niet']},
  {id:'nis2_sector',block:3,blockName:'Jouw beveiliging',text:'Werkt jouw bedrijf samen met of levert het diensten aan één van deze sectoren?',type:'multi',options:['Overheid','Zorg & Ziekenhuizen','Energie','Transport','Financiën & Banken','Drinkwater','Digitale infrastructuur','Geen van deze']},
  {id:'cyber',block:3,text:'Heeft jouw bedrijf een procedure als er een cyberaanval of datalek plaatsvindt?',type:'single',options:['Ja, gedocumenteerd','Informeel ja','Nee','Weet ik niet']},
  {id:'auto_decisions',block:3,text:'Neemt jouw bedrijf geautomatiseerde beslissingen over mensen via AI — zoals bij aanwerving, krediet of prestatiebeoordeling?',type:'single',options:['Ja','Nee','Weet ik niet']},
  {id:'chatbot',block:3,text:'Heeft jouw bedrijf een chatbot of AI-systeem dat communiceert met klanten of bezoekers?',type:'single',options:['Ja, klanten weten dat het AI is','Ja, maar klanten weten het niet','Nee']}
];

let S={step:0,answers:{},email:'',report:null,loading:false,error:null};

function sel(q){const a=S.answers[q.id];return a||(q.type==='multi'?[]:null)}

function toggle(qid,val,multi){
  if(multi){let a=S.answers[qid]||[];S.answers[qid]=a.includes(val)?a.filter(v=>v!==val):[...a,val]}
  else S.answers[qid]=val;
  render();
}

function canGo(){const q=QUESTIONS[S.step];const a=S.answers[q.id];return q.type==='multi'?a&&a.length>0:!!a}

function scores(){
  const a=S.answers;let ai=0,gdpr=0,nis2=0;
  if((a.tools||[]).some(t=>t!=='Geen AI tools'))ai++;
  if((a.usage||[]).some(u=>['Beslissingen over medewerkers','Beslissingen over klanten'].includes(u)))ai++;
  if(a.auto_decisions==='Ja')ai++;
  if(a.chatbot==='Ja, maar klanten weten het niet')ai++;
  if(a.personal_data==='Ja'||a.personal_data==='Weet ik niet')gdpr++;
  if(a.privacy==='Geen van beide'||a.privacy==='Weet ik niet')gdpr++;
  if(a.data_share==='Ja'||a.data_share==='Weet ik niet')gdpr++;
  if((a.data_from||[]).some(d=>['Medewerkers','Sollicitanten'].includes(d)))gdpr++;
  if(!(a.nis2_sector||[]).includes('Geen van deze'))nis2++;
  if(a.cyber==='Nee'||a.cyber==='Weet ik niet')nis2++;
  const l=s=>s<=1?'laag':s<=2?'middel':'hoog';
  return{ai:l(ai),gdpr:l(gdpr),nis2:l(nis2)};
}

function chipClass(r){return r==='laag'?'chip-green':r==='middel'?'chip-amber':'chip-red'}
function riskClass(r){return r==='laag'?'risk-laag':r==='middel'?'risk-middel':'risk-hoog'}
function riskLabel(r){return r==='laag'?'Laag risico':r==='middel'?'Middel risico':'Hoog risico'}

function renderQ(){
  const q=QUESTIONS[S.step];
  const prog=Math.round((S.step/QUESTIONS.length)*100);
  const blockChanged=S.step===0||q.block!==QUESTIONS[S.step-1].block;
  const s=sel(q);
  return`
    ${S.step===0?`<div style="margin-bottom:2rem">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
        <svg width="32" height="32" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <polygon points="24,2 42,12 42,36 24,46 6,36 6,12" fill="#0d1520" stroke="#5DCAA5" stroke-width="1.5"/>
          <polygon points="24,7 37,14 37,34 24,41 11,34 11,14" fill="none" stroke="rgba(93,202,165,0.2)" stroke-width="0.5"/>
          <line x1="24" y1="11" x2="24" y2="37" stroke="#5DCAA5" stroke-width="2"/>
          <line x1="13" y1="18" x2="35" y2="18" stroke="#5DCAA5" stroke-width="2"/>
          <line x1="13" y1="18" x2="11" y2="26" stroke="rgba(93,202,165,0.5)" stroke-width="1.2"/>
          <line x1="13" y1="18" x2="19" y2="26" stroke="rgba(93,202,165,0.5)" stroke-width="1.2"/>
          <path d="M9,26 Q15,31 21,26" fill="none" stroke="#5DCAA5" stroke-width="2"/>
          <line x1="35" y1="18" x2="29" y2="26" stroke="rgba(93,202,165,0.5)" stroke-width="1.2"/>
          <line x1="35" y1="18" x2="37" y2="26" stroke="rgba(93,202,165,0.5)" stroke-width="1.2"/>
          <path d="M27,26 Q33,31 39,26" fill="none" stroke="#5DCAA5" stroke-width="2"/>
          <line x1="19" y1="37" x2="29" y2="37" stroke="#5DCAA5" stroke-width="2"/>
          <circle cx="24" cy="11" r="2" fill="#5DCAA5"/>
        </svg>
        <div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#e8f4ff;line-height:1">AD<span style="color:#5DCAA5">ACTUS</span></div>
          <div style="font-size:8px;color:#5DCAA5;letter-spacing:0.1em;text-transform:uppercase;margin-top:1px">Europese AI compliance. Vastgelegd.</div>
        </div>
      </div>
      <div class="scan-badge">✦ gratis scan</div>
      <h1 class="scan-title">AI Compliance Scan</h1>
      <p class="scan-sub">Uw bedrijf. Uw sector. Uw compliance risico — in 2 minuten in kaart gebracht.</p>
    </div>`:''}
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${prog}%"></div></div>
      <p class="progress-label">Vraag ${S.step+1} van ${QUESTIONS.length}</p>
    </div>
    ${blockChanged?`<p class="block-label">Blok ${q.block} — ${q.blockName}</p>`:''}
    <div class="question-card">
      <p class="question-text">${q.text}</p>
      ${q.type==='multi'?'<p class="multi-note">Meerdere antwoorden mogelijk</p>':''}
      <div class="option-grid">
        ${q.options.map(o=>`<button class="option-btn${q.type==='multi'?(s||[]).includes(o)?' selected':'':s===o?' selected':''}" onclick="toggle('${q.id}','${o.replace(/'/g,"\\'")}',${q.type==='multi'})">${q.type==='multi'?`<span style="margin-right:8px">${(s||[]).includes(o)?'☑':'☐'}</span>`:''} ${o}</button>`).join('')}
      </div>
    </div>
    <div class="nav-row">
      ${S.step>0?`<button class="btn-secondary" onclick="back()">← Terug</button>`:''}
      <button class="btn-primary" onclick="next()" ${canGo()?'':'disabled'}>${S.step===QUESTIONS.length-1?'Resultaten bekijken →':'Volgende →'}</button>
    </div>`;
}

function renderEmail(){
  const sc=scores();
  return`
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:95%"></div></div>
      <p class="progress-label">Bijna klaar</p>
    </div>
    <div class="email-card">
      <h3>Jouw eerste scan-resultaten</h3>
      <p>Dit is een voorvertoning. Vul je e-mailadres in om het volledige rapport met actiepunten te ontvangen.</p>
      <div class="score-preview">
        <div class="score-chip ${chipClass(sc.ai)}"><div class="chip-label">EU AI Act</div><div class="chip-val">${riskLabel(sc.ai)}</div></div>
        <div class="score-chip ${chipClass(sc.gdpr)}"><div class="chip-label">GDPR</div><div class="chip-val">${riskLabel(sc.gdpr)}</div></div>
        <div class="score-chip ${chipClass(sc.nis2)}"><div class="chip-label">NIS2</div><div class="chip-val">${riskLabel(sc.nis2)}</div></div>
      </div>
      <div class="email-input-row">
        <input type="email" id="em" placeholder="jouw@email.be" value="${S.email}" oninput="S.email=this.value" />
        <button class="btn-primary" onclick="submitEmail()">Volledig rapport →</button>
      </div>
      <p class="privacy-note">🔒 Jouw gegevens worden niet gedeeld met derden.</p>
      ${S.error?`<div class="error-msg">${S.error}</div>`:''}
    </div>
    <div class="nav-row"><button class="btn-secondary" onclick="back()">← Terug</button></div>`;
}

function renderLoading(){
  return`<div class="loading-wrap"><div class="spinner"></div><p class="loading-msg">Jouw rapport wordt gegenereerd met actuele wetgeving...</p></div>`;
}

function renderReport(){
  const r=S.report;
  const sc={ai:r.ai_risk,gdpr:r.gdpr_risk,nis2:r.nis2_risk};
  const sections=[
    {key:'ai',title:'EU AI Act',data:r.ai_section},
    {key:'gdpr',title:'GDPR',data:r.gdpr_section},
    {key:'nis2',title:'NIS2',data:r.nis2_section}
  ];
  return`
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:100%"></div></div>
    </div>
    <div class="report-header">
      <h2>Jouw compliance rapport</h2>
      <p>Gegenereerd op basis van actuele EU wetgeving — ${new Date().toLocaleDateString('nl-BE')}</p>
    </div>
    <div class="score-preview" style="margin-bottom:1.5rem">
      <div class="score-chip ${chipClass(sc.ai)}"><div class="chip-label">EU AI Act</div><div class="chip-val">${riskLabel(sc.ai)}</div></div>
      <div class="score-chip ${chipClass(sc.gdpr)}"><div class="chip-label">GDPR</div><div class="chip-val">${riskLabel(sc.gdpr)}</div></div>
      <div class="score-chip ${chipClass(sc.nis2)}"><div class="chip-label">NIS2</div><div class="chip-val">${riskLabel(sc.nis2)}</div></div>
    </div>
    ${sections.map(s=>{
      const cardClass=sc[s.key]==='laag'?'report-card-g':sc[s.key]==='middel'?'report-card-a':'report-card-r';
      return`
      <div class="report-section">
        <div class="report-section-header">
          <span class="rs-title">${s.title}</span>
          <span class="risk-badge ${riskClass(sc[s.key])}">${riskLabel(sc[s.key])}</span>
        </div>
        <div class="report-card ${cardClass}">
          <p>${s.data?.summary||''}</p>
          ${s.data?.actions?.length?`<ul>${s.data.actions.map(a=>`<li>${a}</li>`).join('')}</ul>`:''}
        </div>
      </div>`}).join('')}
    <div class="cta-card">
      <h3>Wil je dieper gaan?</h3>
      <p>Kies een pakket voor een uitgebreidere analyse en persoonlijke begeleiding.</p>
      <div class="cta-tiers">
        <div class="cta-tier"><div class="tier-name">Professional</div><div class="tier-price">€149</div><div class="tier-desc">Uitgebreid rapport + actieplan</div></div>
        <div class="cta-tier"><div class="tier-name">Enterprise</div><div class="tier-price">€499</div><div class="tier-desc">Volledige audit GDPR + AI Act</div></div>
        <div class="cta-tier"><div class="tier-name">Monitoring</div><div class="tier-price">€99/mnd</div><div class="tier-desc">Maandelijkse hercheck + alerts</div></div>
      </div>
    </div>
    <p class="disclaimer">Dit rapport is informatief en vormt geen juridisch advies. De wetgeving evolueert — raadpleeg een juridisch adviseur voor bindende beslissingen.</p>`;
}

function render(){
  const el=document.getElementById('screen');
  if(S.loading){el.innerHTML=renderLoading();return}
  if(S.report){el.innerHTML=renderReport();return}
  if(S.step>=QUESTIONS.length){el.innerHTML=renderEmail();return}
  el.innerHTML=renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}

function next(){if(!canGo())return;S.step++;render()}
function back(){if(S.step>0){S.step--;render()}}

async function submitEmail(){
  const email=S.email.trim();
  if(!email||!email.includes('@')){S.error='Vul een geldig e-mailadres in.';render();return}
  S.error=null;S.loading=true;render();
  try{
    const answersText=QUESTIONS.map(q=>{
      const a=S.answers[q.id];
      return`${q.text}\nAntwoord: ${Array.isArray(a)?a.join(', '):(a||'Geen antwoord')}`;
    }).join('\n\n');

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:`Je bent een AI compliance expert gespecialiseerd in EU AI Act, GDPR en NIS2 voor Belgische en Europese KMO's. Analyseer de antwoorden en geef een compliance rapport. Geef ALLEEN een geldig JSON object terug zonder markdown, backticks of uitleg. Exact dit formaat: {"ai_risk":"laag|middel|hoog","gdpr_risk":"laag|middel|hoog","nis2_risk":"laag|middel|hoog","ai_section":{"summary":"2-3 zinnen","actions":["actie 1","actie 2","actie 3"]},"gdpr_section":{"summary":"2-3 zinnen","actions":["actie 1","actie 2","actie 3"]},"nis2_section":{"summary":"2-3 zinnen","actions":["actie 1","actie 2"]}}. Schrijf in het Nederlands. Houd rekening met de deadline van 2 augustus 2026 voor de EU AI Act.`,
        messages:[{role:'user',content:`Analyseer dit bedrijf:\n\n${answersText}\n\nGenereer het compliance rapport als JSON.`}]
      })
    });

    const data=await res.json();
    let report=null;
    for(const b of(data.content||[])){
      if(b.type==='text'&&b.text){
        try{
          const clean=b.text.replace(/```json|```/g,'').trim();
          const p=JSON.parse(clean);
          if(p.ai_risk){report=p;break}
        }catch(e){}
      }
    }
    if(!report){
      const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      const m=txt.match(/\{[\s\S]*"ai_risk"[\s\S]*\}/);
      if(m)try{report=JSON.parse(m[0])}catch(e){}
    }
    if(!report)throw new Error('Rapport niet gegenereerd');
    S.report=report;S.loading=false;render();
  }catch(err){
    S.loading=false;S.error='Er is iets misgegaan. Probeer opnieuw.';S.step=QUESTIONS.length;render();
  }
}

render();
</script>
</body>
</html>
